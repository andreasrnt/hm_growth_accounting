name: dbt CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  dbt-parse:
    name: Validate dbt project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Create dummy profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          growth_accounting:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: oauth
                project: my-project-2025-473416
                dataset: growth_accounting
                threads: 1
                timeout_seconds: 300
          EOF

      - name: Run dbt parse
        run: dbt parse --project-dir . --profiles-dir ~/.dbt